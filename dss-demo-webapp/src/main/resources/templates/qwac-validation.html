<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout.html}" th:with="currentPage=#{label.qwac.validate}">
	<body>		
		<div layout:fragment="content">
			<form method="post"
				enctype="multipart/form-data"
				th:action="@{/qwac-validation}"
				th:object="${qwacValidationForm}">

				<div th:replace="~{fragment/fields :: field-qwac-url}"></div>

				<div class="card mb-3">
					<div class="card-header cursor-pointer" data-toggle='collapse' data-target='#advancedOptions' aria-expanded='false'>
						<span th:text="#{label.validation.advanced.options}" th:remove="tag"></span>
					</div>
					<div id="advancedOptions" class="card-body collapse in">
						<div th:replace="~{fragment/fields::field-tls-certificate}"></div>
						<div th:replace="~{fragment/fields::field-tls-binding-signature}"></div>
						<div th:replace="~{fragment/fields::field-validation-time}"></div>
						<div th:replace="~{fragment/fields::field-validation-policy(policyUrl='/download-qwac-default-policy')}"></div>
						<div th:replace="~{fragment/fields::field-certificate-tokens}"></div>
						<div th:replace="~{fragment/fields::field-revocation-data-tokens}"></div>
						<div th:replace="~{fragment/fields::field-identifiers}"></div>
					</div>
				</div>

				<div th:replace="~{fragment/fields :: submit-reset}"></div>
			</form>
		</div>
		<div layout:fragment="scripts">
			<script type="text/javascript" th:src="@{/scripts/jsPolicyProvider.js}"></script>
		</div>
	</body>
</html>
